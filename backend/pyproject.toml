[tool.ruff]
line-length = 120
target-version = "py311"
exclude = ["venv", "migrations", "staticfiles"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP"]
ignore = ["E501"]

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "config.settings.development"
python_files = ["test_*.py", "tests.py"]
addopts = "-ra --strict-markers"
